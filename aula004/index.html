<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro script</title>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <script>
        window.alert("Olá, tudo bem?");
        window.confirm("Deseja continuar?");
       const name = window.prompt("Qual é o seu nome?");
       window.document.querySelector("h1").innerText = `Olá ${name}, seja bem-vindo!`;
       window.document.write("O que você deseja fazer, " + name + "?");
    </script>
</body>
</html>
